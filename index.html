<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrixy Client | Official Site</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .main-box {
            text-align: center;
            border: 1px solid #1a1a1a;
            padding: 50px;
            border-radius: 20px;
            background: linear-gradient(145deg, #0f0f0f, #050505);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
            color: #00f2ff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            color: #888;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .download-btn {
            display: inline-block;
            background-color: #00f2ff;
            color: #000;
            padding: 18px 45px;
            font-size: 1.2rem;
            font-weight: 900;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s all ease;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
        .download-btn:hover {
            transform: translateY(-5px);
            background-color: #ffffff;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
        }
        .version-text {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="main-box">
        <h1>ATRIXY CLIENT</h1>
        <p>The next generation of Minecraft PvP performance.</p>

        <a href="AtrixyClient.jar" download="AtrixyClient.jar" class="download-btn">
            DOWNLOAD CLIENT
        </a>

        <div class="version-text">
            Latest Build: v1.0.0 (Fabric 1.21+)
        </div>
    </div>

</body>
</html>
