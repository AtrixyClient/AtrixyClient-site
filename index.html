<!DOCTYPE html>
<html lang="en">
<head>

        :root {
            --bg-dark: #0b0e11;
            --teal-accent: #4fd1c5;
            --card-bg: #1a202c;
            --text-white: #ffffff;
            --text-grey: #a0aec0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
        }

        /* Navbar Section */
        nav {
            background-color: var(--bg-dark);
            padding: 25px;
            border-bottom: 2px solid var(--teal-accent);
        }

        .nav-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--teal-accent);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Hero Banner */
        .hero {
            /* Colorful blurred background pattern like your screenshot */
            background: radial-gradient(circle at 20% 30%, #ff005533 0%, transparent 40%),

                        radial-gradient(circle at 50% 50%, #7dff0022 0%, transparent 50%),
                        var(--bg-dark);
            padding: 120px 20px;
        }

        h1 {
            font-size: clamp(40px, 8vw, 70px);
            margin: 0;
            color: var(--teal-accent);
            font-weight: 900;
        }

        .hero p {
            font-size: 20px;
            margin: 25px 0;
            font-weight: 400;
            opacity: 0.9;
        }

        .download-button {
            background-color: #285e61;
            color: white;
            padding: 18px 50px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            display: inline-block;
            transition: all 0.3s ease;
            border: 2px solid var(--teal-accent);
        }

        .download-button:hover {
            background-color: var(--teal-accent);
            color: var(--bg-dark);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(79, 209, 197, 0.3);
        }

        .preview-section {
            padding: 80px 20px;
        }

        h2 {

            margin-bottom: 50px;
            font-weight: 700;
        }

            height: 400px;
            margin: 0 auto;

            display: flex;
            align-items: center;
            justify-content: center;

            overflow: hidden;
        }

        .ui-box img {
            width: 100%;
            height: auto;
            opacity: 0.6;
        }
