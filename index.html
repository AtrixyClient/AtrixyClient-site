<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrixy Client | Official</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #080808;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            background: #0d0d0d;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }
        h1 {
            font-size: 3.5rem;
            color: #00f2ff;
            margin-bottom: 10px;
            font-weight: 800;
        }
        .btn {
            display: inline-block;
            background-color: #00f2ff;
            color: #000;
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            margin-top: 20px;
        }
        .btn:hover {
            transform: scale(1.05);
            background-color: #ffffff;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ATRIXY CLIENT</h1>
        <p style="color: #888;">The next generation of Minecraft.</p>

        <a href="AtrixyClient.exe" download="AtrixyClient.exe" class="btn">
            DOWNLOAD
        </a>
    </div>

</body>
</html>
