<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtrixYClient | Riptide Network Launcher</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #050a0f;
            --card-bg: rgba(13, 22, 33, 0.8);
            --text: #e0f2f1;
        }

        * { box-sizing: border-box; transition: 0.3s ease; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Animated Water Background */
        .ocean {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a192f 0%, #050a0f 100%);
            z-index: -1;
        }

        /* Navbar */
        nav {
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); letter-spacing: 2px; }

        /* Hero Section */
        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline { opacity: 0.7; font-size: 1.2rem; margin: 15px 0 30px; }

        .btn-download {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-download:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 40px var(--primary);
        }

        /* Bento Grid */
        .container {
            max-width: 1100px;
            margin: 0 auto 100px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
        }

        .card:hover { border-color: var(--primary); }

        .card h3 { color: var(--primary); margin-top: 0; display: flex; align-items: center; gap: 10px; }

        .server-ip {
            background: rgba(0,0,0,0.3
